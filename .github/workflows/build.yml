name: Build

on:
  push:
    branches: [main]
  pull_request:

env:
  RACK_SDK_VERSION: 2.6.1

jobs:

  validate:
    name: Validate plugin.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run manifest validator
        run: |
          pip install -q requests jsonschema
          curl -fsSL https://raw.githubusercontent.com/cschol/rack-library-tools/main/rack-manifest-validator.py -o validator.py
          python validator.py plugin.json

  build-mac:
    name: Build (macOS ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: brew install boost
      - name: Download Rack SDK
        run: |
          curl -fsSL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-mac-arm64.zip" -o rack-sdk.zip
          unzip -q rack-sdk.zip
      - name: Build projectM + plugin
        run: make dep RACK_DIR=Rack-SDK && make RACK_DIR=Rack-SDK
      - name: Verify binary
        run: |
          test -f plugin.dylib || (echo "plugin.dylib not found" && exit 1)
          SIZE=$(wc -c < plugin.dylib)
          echo "Binary size: $SIZE bytes"
          [ "$SIZE" -gt 50000 ] || (echo "Binary suspiciously small" && exit 1)
          nm -g plugin.dylib | grep -q " T _init" || (echo "init symbol missing" && exit 1)
          echo "All checks passed"
      - name: Assemble plugin package
        run: |
          mkdir -p PureDreams
          cp plugin.dylib plugin.json PureDreams/
          cp -r res PureDreams/
      - uses: actions/upload-artifact@v4
        with:
          name: PureDreams-mac-arm64
          path: PureDreams/

  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install GL headers
        run: sudo apt-get install -y libgl-dev cmake
      - name: Static analysis
        run: |
          sudo apt-get install -y cppcheck
          cppcheck --enable=warning,performance --error-exitcode=1 \
            --suppress=missingInclude src/PureDreams.cpp
      - name: Download Rack SDK
        run: |
          curl -fsSL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-lin-x64.zip" -o rack-sdk.zip
          unzip -q rack-sdk.zip
      - name: Build projectM + plugin
        run: make dep RACK_DIR=Rack-SDK && make RACK_DIR=Rack-SDK
      - name: Verify binary
        run: |
          test -f plugin.so || (echo "plugin.so not found" && exit 1)
          SIZE=$(wc -c < plugin.so)
          echo "Binary size: $SIZE bytes"
          [ "$SIZE" -gt 10000 ] || (echo "Binary suspiciously small" && exit 1)
          nm -D plugin.so | grep -q " T init" || (echo "init symbol missing" && exit 1)
          echo "Shared library dependencies:"
          ldd plugin.so
          echo "All checks passed"
      - name: Assemble plugin package
        run: |
          mkdir -p PureDreams
          cp plugin.so plugin.json PureDreams/
          cp -r res PureDreams/
      - uses: actions/upload-artifact@v4
        with:
          name: PureDreams-lin-x64
          path: PureDreams/

  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # VCV Rack 2 itself is built with MSYS2 MINGW64 (linked to msvcrt.dll).
      # Building the plugin with UCRT64 causes a heap-allocator mismatch
      # between Rack (msvcrt) and plugin.dll (ucrtbase) — STATUS_HEAP_CORRUPTION
      # the moment the two cross a malloc/free boundary. Stay on MINGW64.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-glew
            make
            unzip
            curl
            jq
      - name: Download Rack SDK
        run: |
          curl -fsSL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-win-x64.zip" -o rack-sdk.zip
          unzip -q rack-sdk.zip
      - name: Build projectM + plugin
        run: make dep RACK_DIR=Rack-SDK && make RACK_DIR=Rack-SDK
      - name: Verify binary
        run: |
          test -f plugin.dll || (echo "plugin.dll not found" && exit 1)
          SIZE=$(wc -c < plugin.dll)
          echo "Binary size: $SIZE bytes"
          [ "$SIZE" -gt 10000 ] || (echo "Binary suspiciously small" && exit 1)
          echo "DLL imports:"
          objdump -p plugin.dll | grep "DLL Name"
          echo "All checks passed"
      - name: Assemble plugin package
        run: |
          mkdir -p PureDreams
          cp plugin.dll plugin.json PureDreams/
          cp -r res PureDreams/
          # Bundle MinGW runtime DLLs — not present on a stock Windows install.
          # Rack ships its own copies of these in its install dir and Windows
          # will use those once loaded, but bundle ours as a safety net for
          # users running Rack from a portable extract.
          cp /mingw64/bin/libgcc_s_seh-1.dll   PureDreams/
          cp /mingw64/bin/libwinpthread-1.dll  PureDreams/
          cp /mingw64/bin/libstdc++-6.dll      PureDreams/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: PureDreams-win-x64
          path: PureDreams/
